services:
  mmp-sdl2:
    build:
      context: .
      dockerfile: Dockerfile
    image: mmp-sdl2:latest
    container_name: mmp-sdl2
    volumes:
      - ./workspace:/app/workspace
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 16G
        reservations:
          cpus: '2.0'
          memory: 4G
